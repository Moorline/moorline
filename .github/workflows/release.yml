name: Manual Release Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - run: mkdir -p dist/npm-pack
      - run: npm pack ./packages/contracts --pack-destination dist/npm-pack
      - run: npm pack ./packages/core --pack-destination dist/npm-pack
      - run: npm pack ./packages/control-api --pack-destination dist/npm-pack
      - run: npm pack ./packages/http --pack-destination dist/npm-pack
      - run: npm pack ./packages/cli --pack-destination dist/npm-pack
      - uses: actions/upload-artifact@v4
        with:
          name: host-npm-packages
          path: dist/npm-pack/*.tgz

  build-cli:
    name: Build CLI ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
            archive_format: tar.gz
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
            archive_format: tar.gz
          - runner: macos-13
            platform: darwin-x64
            archive_format: tar.gz
          - runner: macos-14
            platform: darwin-arm64
            archive_format: tar.gz
          - runner: windows-latest
            platform: windows-x64
            archive_format: zip
    env:
      MOORLINE_TARGET_PLATFORM: ${{ startsWith(matrix.platform, 'windows') && 'win32' || startsWith(matrix.platform, 'darwin') && 'darwin' || 'linux' }}
      MOORLINE_TARGET_ARCH: ${{ endsWith(matrix.platform, 'arm64') && 'arm64' || 'x64' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run build:cli-artifact -- --platform ${{ matrix.platform }} --archive-format ${{ matrix.archive_format }}
      - name: Smoke packaged CLI on unix
        if: ${{ runner.os != 'Windows' }}
        run: |
          mkdir -p /tmp/moorline-release-smoke
          tar -xzf dist/release-artifacts/moorline-cli-${{ matrix.platform }}.tar.gz -C /tmp/moorline-release-smoke
          /tmp/moorline-release-smoke/moorline-cli-${{ matrix.platform }}/moorline help
          /tmp/moorline-release-smoke/moorline-cli-${{ matrix.platform }}/moorline init --config /tmp/moorline-release-${{ matrix.platform }}.json
      - name: Smoke packaged CLI on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:TEMP\moorline-release-smoke" | Out-Null
          Expand-Archive -Path "dist/release-artifacts/moorline-cli-${{ matrix.platform }}.zip" -DestinationPath "$env:TEMP\moorline-release-smoke" -Force
          & "$env:TEMP\moorline-release-smoke\moorline-cli-${{ matrix.platform }}\moorline.cmd" help
          & "$env:TEMP\moorline-release-smoke\moorline-cli-${{ matrix.platform }}\moorline.cmd" init --config "$env:TEMP\moorline-release-${{ matrix.platform }}.json"
      - name: Generate CLI checksum on unix
        if: ${{ runner.os != 'Windows' }}
        run: sha256sum dist/release-artifacts/moorline-cli-${{ matrix.platform }}.${{ matrix.archive_format == 'zip' && 'zip' || 'tar.gz' }} > dist/release-artifacts/moorline-cli-${{ matrix.platform }}.${{ matrix.archive_format == 'zip' && 'zip' || 'tar.gz' }}.sha256
      - name: Generate CLI checksum on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $path = "dist/release-artifacts/moorline-cli-${{ matrix.platform }}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 $path).Hash.ToLower()
          "$hash  moorline-cli-${{ matrix.platform }}.zip" | Set-Content "$path.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: moorline-cli-${{ matrix.platform }}
          path: |
            dist/release-artifacts/moorline-cli-${{ matrix.platform }}.${{ matrix.archive_format == 'zip' && 'zip' || 'tar.gz' }}
            dist/release-artifacts/moorline-cli-${{ matrix.platform }}.${{ matrix.archive_format == 'zip' && 'zip' || 'tar.gz' }}.sha256
