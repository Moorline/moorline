name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build:packages
      - run: bun run check:fast

  package-smoke:
    needs: fast-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build:packages
      - run: npm pack ./packages/contracts
      - run: npm pack ./packages/core
      - run: npm pack ./packages/control-api
      - run: npm pack ./packages/http
      - run: npm pack ./packages/cli

  cli-smoke:
    needs: fast-gate
    runs-on: ubuntu-latest
    env:
      MOORLINE_TARGET_PLATFORM: linux
      MOORLINE_TARGET_ARCH: x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run build:cli-artifact -- --platform linux-x64 --archive-format tar.gz
      - run: mkdir -p /tmp/moorline-cli-smoke
      - run: tar -xzf dist/release-artifacts/moorline-cli-linux-x64.tar.gz -C /tmp/moorline-cli-smoke
      - run: /tmp/moorline-cli-smoke/moorline-cli-linux-x64/moorline help
      - run: /tmp/moorline-cli-smoke/moorline-cli-linux-x64/moorline init --config /tmp/moorline-ci-config.json
      - run: timeout 10s /tmp/moorline-cli-smoke/moorline-cli-linux-x64/moorline run --config /tmp/moorline-ci-config.json || test $? -eq 124

  full-gate:
    needs:
      - package-smoke
      - cli-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run build:packages
      - run: bun run test:full
